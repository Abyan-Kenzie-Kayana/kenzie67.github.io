<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Abyan Kenzie Kayana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            margin: 0;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #e5e7eb;
            padding-top: 40px;
            border-top-right-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .sidebar h2 {
            color: #0d47a1;
            font-weight: 700;
            padding-left: 40px;
            margin-bottom: 50px;
        }

        .nav-link {
            color: #374151;
            font-size: 1.1rem;
            padding: 10px 40px;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-link:hover, .nav-link.active {
            color: #2563eb;
            font-weight: 600;
        }

        /* Main Content Styling */
        .main-content {
            margin-left: 250px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .profile-img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 50%;
            border: 5px solid #fff;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .profile-title {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .profile-name {
            color: #2563eb;
            font-weight: 800;
            font-size: 2.2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .quote-box {
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .quote-box p {
            color: #1f2937;
            font-size: 1.1rem;
            margin: 5px 0;
        }

        /* Buttons Custom */
        .btn-karya {
            background-color: #2563eb;
            color: white;
            border-radius: 50px;
            padding: 10px 30px;
            font-weight: 600;
            border: none;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
            margin-right: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .btn-karya:hover {
            background-color: #1d4ed8;
            color: white;
            transform: translateY(-2px);
        }

        .btn-tentang {
            background-color: white;
            color: black;
            border-radius: 50px;
            padding: 10px 30px;
            font-weight: 600;
            border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-decoration: none;
            display: inline-block;
        }

        .btn-tentang:hover {
            background-color: #f3f4f6;
            color: black;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-radius: 0;
            }
            .main-content {
                margin-left: 0;
                height: auto;
                padding-top: 50px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Menu</h2>
        <nav class="nav flex-column">
    <a class="nav-link" href="index.html">Beranda</a>
    <a class="nav-link" href="tentang.html">Tentang</a>
    <a class="nav-link" href="pendidikan.html">Pendidikan</a>
    <a class="nav-link" href="organisasi.html">Organisasi</a>
    <a class="nav-link" href="prestasi.html">Prestasi</a>
    <a class="nav-link" href="skill.html">Kemampuan</a> <a class="nav-link" href="kontak.html">Kontak</a>
</nav>
    </div>

    <div class="main-content">
        <div class="container">
           <img src="kenzie.png" alt="Profile Image" class="profile-img">
            
            <h3 class="profile-title">Portofolio/CV</h3>
            <h1 class="profile-name">Abyan Kenzie Kayana</h1>
            
            <div class="quote-box">
                <p>whats up guys? selamat datang di portofolio singkat saya</p>
                <p><strong>"Meskipun hanya 1%, aku harus lebih baik hari ini!"</strong></p>
            </div>

            <div class="mt-4">
                <a href="https://karya.pplg.smkn1bawang.sch.id/siswa/abyankenziekayanapplg1202520347" class="btn-karya">Karya Saya</a>
                <a href="tentang.html" class="btn-tentang">Tentang Saya</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
