<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organisasi - Abyan Kenzie Kayana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            margin: 0;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #e5e7eb;
            padding-top: 40px;
            border-top-right-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .sidebar h2 {
            color: #0d47a1;
            font-weight: 700;
            padding-left: 40px;
            margin-bottom: 50px;
        }

        .nav-link {
            color: #374151;
            font-size: 1.1rem;
            padding: 10px 40px;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-link:hover, .nav-link.active {
            color: #2563eb;
            font-weight: 600;
        }

        /* Main Content Styling */
        .main-content {
            margin-left: 250px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .section-title {
            color: #0d47a1;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 50px;
            position: absolute;
            top: 50px;
        }

        /* Empty State Card */
        .empty-card {
            background-color: white;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Kotak Putih di Atas Card */
        .empty-icon-box {
            position: absolute;
            top: -30px;
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .empty-text {
            font-weight: 700;
            font-size: 1.5rem;
            color: #000;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-radius: 0;
            }
            .main-content {
                margin-left: 0;
                justify-content: flex-start;
                padding-top: 100px;
            }
            .section-title {
                position: relative;
                top: 0;
                margin-bottom: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Menu</h2>
        <nav class="nav flex-column">
            <a class="nav-link" href="index.html">Beranda</a>
            <a class="nav-link" href="tentang.html">Tentang</a>
            <a class="nav-link" href="pendidikan.html">Pendidikan</a>
            <a class="nav-link active" href="organisasi.html">Organisasi</a>
            <a class="nav-link" href="prestasi.html">Prestasi</a>
            <a class="nav-link" href="skill.html">Kemampuan</a>
            <a class="nav-link" href="kontak.html">Kontak</a>
        </nav>
    </div>

    <div class="main-content">
        <h1 class="section-title">Organisasi</h1>

        <div class="empty-card">
            <div class="empty-icon-box"></div>
            
            <div class="empty-text">
                404 not found
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
