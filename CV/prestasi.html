<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestasi - Abyan Kenzie Kayana</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #d1d5db;
            margin: 0;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #e5e7eb;
            padding-top: 40px;
            border-top-right-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .sidebar h2 {
            color: #0d47a1;
            font-weight: 700;
            padding-left: 40px;
            margin-bottom: 50px;
        }

        .nav-link {
            color: #374151;
            font-size: 1.1rem;
            padding: 10px 40px;
            transition: 0.3s;
            text-decoration: none;
        }

        .nav-link:hover, .nav-link.active {
            color: #2563eb;
            font-weight: 600;
        }

        /* Main Content Styling */
        .main-content {
            margin-left: 250px;
            min-height: 100vh;
            padding: 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-title {
            color: #0d47a1;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 50px;
            text-align: center;
        }

        /* Achievement Card Styling */
        .achievement-card {
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 800px;
            width: 100%;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 30px;
            transition: transform 0.3s;
        }

        .achievement-card:hover {
            transform: scale(1.02);
        }

        .achievement-img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .achievement-text {
            font-weight: 700;
            font-size: 1.4rem;
            color: #000;
            line-height: 1.3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-radius: 0;
            }
            .main-content {
                margin-left: 0;
            }
            .achievement-card {
                flex-direction: column;
                text-align: center;
                gap: 15px;
            }
            .achievement-img {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Menu</h2>
        <nav class="nav flex-column">
            <a class="nav-link" href="index.html">Beranda</a>
            <a class="nav-link" href="tentang.html">Tentang</a>
            <a class="nav-link" href="pendidikan.html">Pendidikan</a>
            <a class="nav-link" href="organisasi.html">Organisasi</a>
            <a class="nav-link active" href="prestasi.html">Prestasi</a>
            <a class="nav-link" href="skill.html">Kemampuan</a>
            <a class="nav-link" href="kontak.html">Kontak</a>
        </nav>
    </div>

    <div class="main-content">
        <h1 class="section-title">Prestasi</h1>

        <div class="achievement-card">
            <img src="gwe.jpeg" alt="Juara Lomba Cakap Fitur" class="achievement-img">
            <div class="achievement-text">
                Juara 1 Lomba Cakap Fitur digital Andalusia Tahun 2022
            </div>
        </div>

        <div class="achievement-card">
            <img src="medali.jpeg" alt="Gold Medalist Competition" class="achievement-img">
            <div class="achievement-text">
                Gold Medalist National Science & English Competition cabang Bahasa Inggris SMP Tahun 2024
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
